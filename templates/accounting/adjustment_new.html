{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-1">New Adjustment</h3>
    <div class="text-muted">{{ technician_name }}</div>
  </div>

  <a class="btn btn-outline-secondary"
     href="{{ url_for(
       'accounting.technician_ledger',
       technician_name=technician_name
     ) }}">
    ← Back
  </a>
</div>

{% if summary %}
<div class="row g-3 mb-4">
  <div class="col-md-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <small class="text-muted">Current Balance</small>
        <h3 class="mb-0 text-danger">
          ${{ '%.2f'|format(summary.remaining) }}
        </h3>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <small class="text-muted">Open Invoices</small>
        <h3 class="mb-0">{{ summary.open_invoices }}</h3>
      </div>
    </div>
  </div>
</div>
{% endif %}

<form method="post"
      action="{{ url_for(
        'accounting.adjustment_create',
        technician_name=technician_name
      ) }}"
      class="card border-0 shadow-sm">

  <div class="card-body">
    <div class="row g-3">

      <div class="col-md-4">
        <label class="form-label">Adjustment Type</label>

        <select name="adjustment_type"
                class="form-select"
                required>
          <option value="ADJUSTMENT_PLUS">
            Increase Technician Debt
          </option>

          <option value="ADJUSTMENT_MINUS">
            Reduce Technician Debt
          </option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Amount</label>

        <input type="number"
               name="amount"
               class="form-control"
               min="0.01"
               step="0.01"
               required>
      </div>

      <div class="col-12">
        <label class="form-label">Reason</label>

        <textarea name="reason"
                  class="form-control"
                  rows="3"
                  maxlength="255"
                  placeholder="Explain why this balance adjustment is required"
                  required></textarea>
      </div>

    </div>

    <div class="mt-4 d-flex gap-2">
      <button class="btn btn-primary">
        Post Adjustment
      </button>

      <a class="btn btn-outline-secondary"
         href="{{ url_for(
           'accounting.technician_ledger',
           technician_name=technician_name
         ) }}">
        Cancel
      </a>
    </div>
  </div>
</form>

{% endblock %}
